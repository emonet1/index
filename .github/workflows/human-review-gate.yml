name: 🛡️ 人工审查门禁

on:
  pull_request:
    branches: [ main ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 检测变更量
        run: |
          # 获取变更行数
          LINES=$(git diff --shortstat origin/main | awk '{print $4}')
          echo "Changed lines: $LINES"
          
          if [ "$LINES" -gt 100 ]; then
            echo "⚠️ 变更超过 100 行，强制失败，请求人工审查！"
            exit 1
          fi
          
      - name: 🔍 检测核心文件
        run: |
          # 检查是否修改了数据库配置或密钥文件
          if git diff --name-only origin/main | grep -E "config.py|secrets|database"; then
             echo "⚠️ 核心配置文件被修改，强制失败，请求人工审查！"
             exit 1
          fi
