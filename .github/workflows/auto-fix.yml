name: 🛡️ AI 智能修复与一键响应

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-fixer:
    # 触发条件：Issue 带有 auto-fix 标签，或者在该 Issue 下回复指令
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'auto-fix')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'auto-fix') && startsWith(github.event.comment.body, '/apply'))
    
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 初始化 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖
        run: pip install requests

      - name: 🧠 运行 AI 对抗修复逻辑
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: python .github/scripts/ai_fix.py

      - name: 🚀 提交代码并推送 PR
        if: hashFiles('FIX_DONE')
        run: |
          git config --global user.name "AI-Auto-Fixer"
          git config --global user.email "ai-bot@github.com"
          BRANCH_NAME="ai-auto-fix-${{ github.event.issue.number }}-${{ github.run_id }}"
          git checkout -b $BRANCH_NAME
          git add .
          git commit -m "fix: AI automated repair for Issue #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME
          
          gh pr create --title "🤖 AI Fix: #${{ github.event.issue.number }}" \
                       --body "This PR was automatically generated by AI. Please review before merging." \
                       --base main --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-monitor:
    name: 🔍 PR 安全检测
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: ✅ 完成性检查
        run: |
          echo "PR 已检测到。请人工在 Files changed 页面审核 AI 生成的代码。"
