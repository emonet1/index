name: 🛡️ AI 智能修复与一键响应

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-fixer:
    # ✅ 修复1：不用 | 多行写法，改用单行条件，避免 YAML 解析 Bug
    # ✅ 修复2：issue_comment 触发时，必须包含 /apply 指令
    if: >-
      (github.event_name == 'issues' &&
       (contains(github.event.issue.labels.*.name, 'auto-fix') ||
        startsWith(github.event.issue.title, '[AUTO-FIX]'))) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'auto-fix') &&
       startsWith(github.event.comment.body, '/apply'))

    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4
        with:
          # ✅ 修复3：使用 PERSONAL_ACCESS_TOKEN，确保后续 push 有权限
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: 🐍 初始化 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖
        run: pip install requests

      - name: 🧠 运行 AI 对抗修复逻辑
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY:      ${{ secrets.QWEN_API_KEY }}
          # ✅ 修复4：GITHUB_TOKEN 也改为 PERSONAL_ACCESS_TOKEN
          GITHUB_TOKEN:      ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
          ISSUE_BODY:        ${{ github.event.issue.body }}
          COMMENT_BODY:      ${{ github.event.comment.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/ai_fix.py

      - name: 🚀 提交代码并推送 PR
        if: hashFiles('FIX_DONE') != ''
        run: |
          git config --global user.name "AI-Auto-Fixer"
          git config --global user.email "ai-bot@github.com"
          BRANCH_NAME="ai-auto-fix-${{ github.event.issue.number }}-${{ github.run_id }}"
          git checkout -b $BRANCH_NAME
          git add -A
          # ✅ 修复5：有文件变更才 commit，避免 "nothing to commit" 错误
          if git diff --staged --quiet; then
            echo "⚠️ 没有检测到文件变更，跳过 PR 创建"
            exit 0
          fi
          git commit -m "fix: AI automated repair for Issue #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME
          gh pr create \
            --title "🤖 AI Fix: Issue #${{ github.event.issue.number }}" \
            --body "此 PR 由 AI 自动生成，修复 Issue #${{ github.event.issue.number }}。请在 Files changed 页面审核后合并。" \
            --base main \
            --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: ❌ 失败通知
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            const issueNum = context.payload.issue?.number;
            if (issueNum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                body: `❌ **AI 修复流程出错**\n请检查 [Actions 日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
            }

  pr-monitor:
    name: 🔍 PR 安全检测
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ✅ 完成性检查
        run: |
          echo "PR 已检测到。请人工在 Files changed 页面审核 AI 生成的代码。"
