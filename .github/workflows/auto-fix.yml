name: Codex Intelligent Fix and Response

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-fixer:
    if: >-
      (github.event_name == 'issues' &&
       (contains(github.event.issue.labels.*.name, 'auto-fix') ||
        startsWith(github.event.issue.title, '[AUTO-FIX]'))) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'auto-fix') &&
       startsWith(github.event.comment.body, '/apply'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Validate AI fix script exists
        run: |
          test -f .github/scripts/ai_fix.py

      - name: Validate AI fix script syntax
        run: |
          python -m py_compile .github/scripts/ai_fix.py

      - name: Run Codex fix workflow
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-5.4' }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/ai_fix.py

      - name: Commit changes and create PR
        if: hashFiles('FIX_DONE') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git config --global user.name "AI-Auto-Fixer"
          git config --global user.email "ai-bot@github.com"
          BRANCH_NAME="ai-auto-fix-${{ github.event.issue.number }}-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          git add -A

          if git diff --staged --quiet; then
            echo "No file changes detected. Skipping PR creation."
            exit 0
          fi

          git commit -m "fix: Codex automated repair for Issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "Codex Fix: Issue #${{ github.event.issue.number }}" \
            --body "This PR was generated automatically by Codex to address Issue #${{ github.event.issue.number }}. Please review the changes before merging." \
            --base main \
            --head "$BRANCH_NAME"

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            const issueNum = context.payload.issue?.number;
            if (issueNum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                body: `Codex fix workflow failed.\nPlease check the Actions log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              });
            }

  pr-monitor:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Completion check
        run: |
          echo "Pull request detected. Please review the Codex-generated code on the Files changed tab."
