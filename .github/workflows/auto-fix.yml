name: 🛠️ AI 自动修复专家

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-handler:
    # 🔴 关键修复：只有带 auto-fix 标签的 Issue 或在该 Issue 下的评论才触发
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'auto-fix')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'auto-fix') && startsWith(github.event.comment.body, '/apply'))
    
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🧠 AI Arbitration & Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          # 🔴 修复：确保从 issue 对象获取标题和内容
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        # 🔴 修复：指向正确的脚本路径
        run: python .github/scripts/ai_fix.py

      - name: 📤 Push Changes & Create PR
        if: hashFiles('FIX_DONE')
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "ai-bot@github.com"
          BRANCH_NAME="ai-fix-${{ github.event.issue.number }}-${{ github.run_id }}"
          git checkout -b $BRANCH_NAME
          git add .
          git commit -m "fix: automated AI fix for #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME
          gh pr create --title "🤖 AI Fix: #${{ github.event.issue.number }}" \
                       --body "This PR was generated by AI Leader. Please review the changes." \
                       --head $BRANCH_NAME --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-safety-gate:
    name: 🛡️ PR 安全门禁
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Scan Changes
        id: gate
        run: |
          # 获取 diff 统计，并处理空值防止算术错误
          STAT=$(git diff --shortstat origin/main...HEAD || echo "0 insertions, 0 deletions")
          INS=$(echo "$STAT" | grep -oP '\d+(?= insertion)' || echo "0")
          DEL=$(echo "$STAT" | grep -oP '\d+(?= deletion)' || echo "0")
          
          # 🔴 修复：确保 INS/DEL 至少为 0
          INS=${INS:-0}
          DEL=${DEL:-0}
          TOTAL=$((INS + DEL))
          
          echo "Total changes: $TOTAL lines"
          if [ "$TOTAL" -gt 100 ]; then
            echo "🚨 Change too large ($TOTAL lines). Human approval required."
            exit 1
          fi
