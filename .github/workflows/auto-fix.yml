name: 🤖 双AI仲裁自动修复

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-fix:
    # ✅ 修复：labeled 事件用 github.event.label.name，opened 事件用 labels 列表
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'auto-fix') ||
      (github.event.action != 'labeled' && contains(github.event.issue.labels.*.name, 'auto-fix'))
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install requests

      - name: 🤖 运行双AI仲裁脚本
        env:
          GITHUB_TOKEN:      ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY:      ${{ secrets.QWEN_API_KEY }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          ISSUE_BODY:        ${{ github.event.issue.body }}
          ISSUE_TITLE:       ${{ github.event.issue.title }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/ai_fix.py

      - name: 🛑 拦截：需要人工审查
        if: hashFiles('human_review_needed.txt') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            const fs = require('fs');
            const reason = fs.readFileSync('human_review_needed.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🛑 AI 拒绝自动修复\n\n**原因**: ${reason}\n\n> 请人工介入审查。`
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'auto-fix'
              });
            } catch(e) {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-human-review']
            });

      - name: 📝 创建修复 Pull Request
        if: hashFiles('human_review_needed.txt') == '' && hashFiles('AI_REVIEW_REPORT.md') != ''
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          commit-message: "🤖 双AI修复: Issue #${{ github.event.issue.number }}"
          branch: "auto-fix/issue-${{ github.event.issue.number }}"
          delete-branch: true
          title: "🤖 [AI仲裁] 修复 Issue #${{ github.event.issue.number }}"
          body-path: AI_REVIEW_REPORT.md
          labels: |
            auto-fix
            dual-ai-reviewed
            automated-pr

      - name: 💬 通知修复结果
        if: steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **双AI仲裁修复已完成！**\n\n- 🟦 通义千问 (方案A)\n- 🟩 Gemini (方案B)\n- ⚖️ **Gemini Leader 仲裁**\n\n🔗 **查看修复 PR**: #${{ steps.create-pr.outputs.pull-request-number }}`
            })

      - name: ❌ 失败兜底通知
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **AI 修复流程出错**\n请检查 [Actions 日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
