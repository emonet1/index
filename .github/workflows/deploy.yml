name: 🚀 自动部署到服务器

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    # 只有当 PR 被合并 (merged=true) 时才触发
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 同步代码到服务器
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # ⚠️ 核心保护规则：防止覆盖数据库、环境变量和日志
          ARGS: "-avz --delete --exclude='.git/' --exclude='.github/' --exclude='*.log' --exclude='monitor_*.log' --exclude='.env' --exclude='pb/pb_data/' --exclude='pb/pb_migrations/' --exclude='pb/logs/'"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          # ⚠️ 严格保留你指定的服务器路径
          TARGET: "/home/"

      - name: 🔄 重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 代码已部署，正在重启服务..."
            
            # 1. 检查 supervisorctl 是否可用
            if ! command -v supervisorctl &> /dev/null; then
              echo "⚠️ supervisorctl 未安装，跳过服务重启"
              exit 0
            fi
            
            # 2. 定义需要重启的服务列表
            SERVICES=("pocketbase" "ai-proxy" "websocket")
            FAILED_SERVICES=0
            
            # 3. 逐个重启服务并检测结果
            for SERVICE in "${SERVICES[@]}"; do
              echo "🔄 正在重启 $SERVICE..."
              if supervisorctl restart $SERVICE; then
                echo "✅ $SERVICE 重启成功"
              else
                echo "❌ $SERVICE 重启失败"
                FAILED_SERVICES=1
              fi
            done
            
            # 4. 显示最终服务状态
            echo ""
            echo "📊 当前服务状态："
            supervisorctl status
            
            # 5. 如果有任何服务重启失败，标记此部署任务为失败
            if [ $FAILED_SERVICES -eq 1 ]; then
              echo "❌ 部署检测到部分服务重启失败，请检查服务器日志！"
              exit 1
            fi
            
            echo "✅ 所有服务重启完成！"
