name: 🚀 自动部署到服务器

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 同步代码到服务器
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # ⚠️ 核心保护规则：防止覆盖数据库、环境变量、日志和二进制可执行文件
          ARGS: "-avz --delete
            --exclude='.git/'
            --exclude='.github/'
            --exclude='*.log'
            --exclude='monitor_*.log'
            --exclude='.env'
            --exclude='pb/pb_data/'
            --exclude='pb/pb_migrations/'
            --exclude='pb/logs/'
            --exclude='pb/pocketbase'
            --exclude='ubuntu/'"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: "/home/"

      - name: 🔄 重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 代码已部署，正在重启服务..."

            if ! command -v supervisorctl &> /dev/null; then
              echo "⚠️ supervisorctl 未安装，跳过服务重启"
              exit 0
            fi

            # 重启前先验证 pocketbase 可执行文件存在
            if [ ! -f "/home/pb/pocketbase" ] && [ ! -L "/home/pb/pocketbase" ]; then
              echo "❌ 严重错误：/home/pb/pocketbase 不存在，跳过重启以防损坏！"
              exit 1
            fi

            SERVICES=("pocketbase" "ai-proxy" "websocket")
            FAILED_SERVICES=0

            for SERVICE in "${SERVICES[@]}"; do
              echo "🔄 正在重启 $SERVICE..."
              if sudo supervisorctl restart $SERVICE; then
                echo "✅ $SERVICE 重启成功"
              else
                echo "❌ $SERVICE 重启失败"
                FAILED_SERVICES=$((FAILED_SERVICES + 1))
              fi
            done

            echo ""
            echo "📊 当前服务状态："
            sudo supervisorctl status

            if [ $FAILED_SERVICES -gt 0 ]; then
              echo "❌ 部署检测到 ${FAILED_SERVICES} 个服务重启失败，请检查服务器日志！"
              exit 1
            fi

            echo "✅ 所有服务重启完成！"
