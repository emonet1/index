name: 🚀 自动部署到服务器

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    # 只有当 PR 被合并 (merged=true) 时才触发
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 同步代码到服务器
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete --exclude='.git/' --exclude='.github/' --exclude='*.log' --exclude='monitor_*.log' --exclude='.env' --exclude='pb/pb_data/' --exclude='pb/pb_migrations/' --exclude='pb/logs/'"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          # ⚠️ 严重注意：请确认服务器上的项目实际路径！
          # 如果你的项目在 /home/ubuntu/emonet1/index，请填这个路径
          # 下面我使用 SSH_USER 变量动态拼接，比写死 /home/ 更安全
          TARGET: "/home/${{ secrets.SSH_USER }}/emonet1/index/" 

      - name: 🔄 重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 切换到项目目录 (请与上面的 TARGET 保持一致)
            PROJECT_DIR="/home/${{ secrets.SSH_USER }}/emonet1/index/"
            cd $PROJECT_DIR || { echo "❌ 找不到项目目录"; exit 1; }

            echo "🚀 代码已部署，正在重启服务..."
            
            # 赋予脚本执行权限 (防止新脚本上传后没权限)
            chmod +x *.py .github/scripts/*.py 2>/dev/null || true
            
            # 检查 supervisorctl
            if ! command -v supervisorctl &> /dev/null; then
              echo "⚠️ supervisorctl 未安装，跳过服务重启"
              exit 0
            fi
            
            # 逐个重启
            services=("pocketbase" "ai-proxy" "websocket")
            has_error=0
            
            for svc in "${services[@]}"; do
                echo "正在重启 $svc ..."
                if supervisorctl restart $svc; then
                    echo "✅ $svc 重启成功"
                else
                    echo "❌ $svc 重启失败"
                    has_error=1
                fi
            done
            
            echo ""
            echo "📊 服务状态："
            supervisorctl status
            
            if [ $has_error -eq 1 ]; then
              exit 1
            fi
